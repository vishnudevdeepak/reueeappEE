<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | ReuseMart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --green: #27ae60;
  --green-light: #2ecc71;
  --green-dark: #1a7a42;
  --white: #ffffff;
  --text: #1a2e22;
  --muted: #6b8f78;
  --panel-bg: #27ae60;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
body {
  min-height: 100vh;
  background: #f0faf5;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.wrapper {
  width: 100%;
  max-width: 820px;
  min-height: 520px;
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(39,174,96,0.18);
  overflow: hidden;
  position: relative;
  background: #fff;
  display: flex;
  opacity: 0;
  transform: translateX(32px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.wrapper.enter {
  opacity: 1;
  transform: translateX(0);
}

.wrapper.exit {
  opacity: 0;
  transform: translateX(24px);
}

.panel {
  position: absolute;
  top: 0; left: 0;
  width: 42%;
  height: 100%;
  background: linear-gradient(145deg, var(--green-light), var(--green-dark));
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 32px;
  z-index: 10;
  box-shadow: 8px 0 32px rgba(39,174,96,0.18);
}

.panel h2 {
  color: #fff;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 10px;
}

.panel p {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  margin-bottom: 28px;
}

/* FIXED: was "..form-box" (double dot) — now correctly ".form-box" */
.form-box {
  width: 58%;
  margin-left: 42%;
  padding: 48px 44px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.form-box h3 {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 28px;
}

.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid rgba(39,174,96,0.22);
  border-radius: 10px;
  background: #f9fefb;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}

.input-group input::placeholder { color: var(--muted); }

.input-group input:focus {
  border-color: var(--green);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(39,174,96,0.10);
}

.submit-btn,
.back-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.submit-btn {
  background: linear-gradient(90deg, var(--green-light), var(--green-dark));
  color: #fff;
  box-shadow: 0 4px 14px rgba(39,174,96,0.28);
  margin-top: 8px;
}

.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39,174,96,0.36); }

.back-btn {
  margin-top: 12px;
  color: var(--green);
  background: transparent;
  text-align: center;
}

.error {
  color: #e74c3c;
  font-size: 13px;
  margin-top: 8px;
  min-height: 18px;
}

@media (max-width: 620px) {
  .wrapper { flex-direction: column; max-width: 400px; min-height: unset; }
  .panel { position: relative; width: 100%; left: 0; border-radius: 20px; padding: 32px 24px; min-height: 200px; }
  .form-box { width: 100%; margin-left: 0; padding: 36px 24px; }
}
</style>
</head>
<body>

<div class="wrapper" id="wrapper">
  <div class="panel">
    <h2>Reset your password</h2>
    <p>Enter your email and choose a new secure password.</p>
  </div>

  <div class="form-box">
    <h3>Forgot Password</h3>

    <div class="input-group">
      <input type="email" id="resetEmail" placeholder="Email address">
    </div>
    <div class="input-group">
      <input type="password" id="resetPass" placeholder="New password">
    </div>
    <div class="input-group">
      <input type="password" id="confirmPass" placeholder="Confirm new password">
    </div>

    <button type="button" class="submit-btn" onclick="resetPassword()">Reset Password</button>
    <button type="button" class="back-btn" onclick="goBackToLogin()">← Back to Login</button>
    <p class="error" id="resetError"></p>
  </div>
</div>

<script>
const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null')
  ? 'http://localhost:3000' : window.location.origin;

function goBackToLogin() {
  const wrapper = document.getElementById('wrapper');
  wrapper.classList.add('exit');
  setTimeout(() => {
    if (typeof navigateTo === 'function') navigateTo('login.html');
    else window.location.href = 'login.html';
  }, 250);
}

async function resetPassword() {
  const email = document.getElementById('resetEmail').value.trim();
  const password = document.getElementById('resetPass').value.trim();
  const confirm = document.getElementById('confirmPass').value.trim();
  const err = document.getElementById('resetError');
  err.style.color = '#e74c3c';
  err.textContent = '';

  if (!email || !password || !confirm) {
    err.textContent = 'Please fill in all fields.';
    return;
  }
  if (password !== confirm) {
    err.textContent = 'Passwords do not match.';
    return;
  }
  if (password.length < 5) {
    err.textContent = 'Password must be at least 5 characters.';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: email, newPassword: password })
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      err.textContent = data.message || 'Unable to reset password.';
      return;
    }

    err.style.color = '#0b8238';
    err.textContent = data.message || 'Password reset successfully.';
    document.getElementById('resetPass').value = '';
    document.getElementById('confirmPass').value = '';

    setTimeout(() => {
      const wrapper = document.getElementById('wrapper');
      wrapper.classList.add('exit');
      setTimeout(() => {
        if (typeof navigateTo === 'function') navigateTo('login.html');
        else window.location.href = 'login.html';
      }, 250);
    }, 900);
  } catch (error) {
    err.textContent = 'Unable to contact the server.';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  requestAnimationFrame(() => {
    document.getElementById('wrapper').classList.add('enter');
  });
});
</script>
</body>
</html>
