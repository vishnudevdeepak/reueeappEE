<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ReuseMart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --green: #27ae60;
  --green-light: #2ecc71;
  --green-dark: #1a7a42;
  --green-pale: #eafaf1;
  --white: #ffffff;
  --text: #1a2e22;
  --muted: #6b8f78;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  background: #f0faf5;
  display: flex;
}

/* ── Wrapper fills full viewport ── */
.wrapper {
  width: 100%;
  height: 100vh;
  position: relative;
  background: #fff;
  display: flex;
  overflow: hidden;
}

/* ── Sliding Green Panel ── */
.panel {
  position: absolute;
  top: 0; left: 0;
  width: 42%;
  height: 100%;
  background: linear-gradient(145deg, var(--green-light), var(--green-dark));
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 32px;
  z-index: 10;
  transition: left 0.65s cubic-bezier(0.77,0,0.18,1);
  box-shadow: 8px 0 32px rgba(39,174,96,0.18);
}

.panel.right { left: 58%; box-shadow: -8px 0 32px rgba(39,174,96,0.18); }

.panel::before {
  content: '';
  position: absolute;
  width: 260px; height: 260px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  top: -80px; right: -80px;
}
.panel::after {
  content: '';
  position: absolute;
  width: 180px; height: 180px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  bottom: -50px; left: -50px;
}

.panel h2 {
  color: #fff;
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 12px;
  position: relative; z-index: 1;
}

.panel p {
  color: rgba(255,255,255,0.85);
  font-size: 15px;
  margin-bottom: 32px;
  position: relative; z-index: 1;
}

.panel-btn {
  border: 2px solid #fff;
  background: transparent;
  color: #fff;
  padding: 12px 40px;
  border-radius: 30px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; z-index: 1;
}

.panel-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

.leaf {
  margin-bottom: 20px;
  position: relative; z-index: 1;
  animation: float 3s ease-in-out infinite;
}
.leaf svg { width: 56px; height: 56px; fill: rgba(255,255,255,0.9); }
.input-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ── Form Panes ── */
.forms {
  display: flex;
  width: 100%;
}

.form-box {
  width: 58%;
  padding: 0 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: opacity 0.4s, transform 0.4s;
}

.form-box.login-form  { margin-left: 42%; }
.form-box.signup-form { margin-left: 0; }

.form-box.hidden-form {
  opacity: 0;
  pointer-events: none;
  position: absolute;
}

.form-box h3 {
  font-size: 30px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 32px;
}

/* ── Inputs ── */
.input-group {
  position: relative;
  margin-bottom: 20px;
}

.input-group input {
  width: 100%;
  padding: 15px 48px 15px 18px;
  border: 1.5px solid rgba(39,174,96,0.22);
  border-radius: 12px;
  background: #f9fefb;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}

.input-group input::placeholder { color: var(--muted); }

.input-group input:focus {
  border-color: var(--green);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(39,174,96,0.10);
}

.input-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.input-icon:hover { color: var(--green); }

.forgot {
  font-size: 13px;
  color: var(--muted);
  text-align: right;
  margin-bottom: 24px;
  cursor: pointer;
  transition: color 0.2s;
}
.forgot:hover { color: var(--green); }

.submit-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(90deg, var(--green-light), var(--green-dark));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(39,174,96,0.28);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(39,174,96,0.36);
}

.social-label {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin: 24px 0 16px;
  position: relative;
}
.social-label::before,.social-label::after {
  content:'';
  position: absolute;
  top:50%;
  width: 28%;
  height: 1px;
  background: rgba(39,174,96,0.2);
}
.social-label::before { left: 0; }
.social-label::after  { right: 0; }

.socials {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.social-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1.5px solid rgba(39,174,96,0.25);
  background: #f9fefb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 16px;
  font-weight: 600;
  color: #DB4437;
}

.social-btn:hover {
  border-color: var(--green);
  background: #eafaf1;
  transform: translateY(-2px) scale(1.1);
  box-shadow: 0 3px 10px rgba(39,174,96,0.15);
}

.error {
  color: #e74c3c;
  font-size: 13px;
  margin-top: 10px;
  min-height: 18px;
}

/* ── Responsive ── */
@media (max-width: 620px) {
  html, body { overflow: auto; }
  .wrapper { flex-direction: column; height: auto; min-height: 100vh; }
  .panel { position: relative; width: 100%; left: 0 !important; padding: 40px 24px; min-height: 220px; }
  .form-box { width: 100%; margin-left: 0 !important; padding: 40px 24px; }
  .form-box.hidden-form { display: none; }
}
</style>
</head>
<body>

<div class="wrapper" id="wrapper">

  <div class="panel" id="panel">
    <div class="leaf">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.34A1 1 0 004.69 21 18 18 0 0021 3a1 1 0 00-4 5z"/></svg>
    </div>
    <h2 id="panelTitle">Hello, Welcome!</h2>
    <p id="panelSub">Don't have an account?</p>
    <button class="panel-btn" id="panelBtn" onclick="switchToSignup()">Register</button>
  </div>

  <!-- Login Form -->
  <div class="form-box login-form" id="loginBox">
    <h3>Login</h3>

    <div class="input-group">
      <input type="text" id="loginUser" placeholder="Username">
      <span class="input-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="password" id="loginPass" placeholder="Password">
      <span class="input-icon" id="loginPassIcon" onclick="toggle('loginPass','loginPassIcon')"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
    </div>

    <p class="forgot" onclick="forgotPassword()">Forgot password?</p>

    <button class="submit-btn" onclick="login()">Login</button>
    <p class="error" id="loginError"></p>

    <p class="social-label">or login with social platforms</p>
    <div class="socials">
      <button class="social-btn" onclick="socialLogin('google')" title="Login with Google">G</button>
    </div>
  </div>

  <!-- Signup Form -->
  <div class="form-box signup-form hidden-form" id="signupBox">
    <h3>Registration</h3>

    <div class="input-group">
      <input type="text" id="signupUser" placeholder="Username">
      <span class="input-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="email" id="signupEmail" placeholder="Email">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="password" id="signupPass" placeholder="Password">
      <span class="input-icon" id="signupPassIcon" onclick="toggle('signupPass','signupPassIcon')"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
    </div>

    <button class="submit-btn" onclick="signup()">Register</button>
    <p class="error" id="signupError"></p>

    <p class="social-label">or register with social platforms</p>
    <div class="socials">
      <button class="social-btn" onclick="socialSignup('google')" title="Register with Google">G</button>
    </div>
  </div>

</div>

<script>
let isLogin = true;

function switchToSignup() {
  if (!isLogin) return;
  isLogin = false;
  document.getElementById('panel').classList.add('right');
  document.getElementById('loginBox').classList.add('hidden-form');
  document.getElementById('signupBox').classList.remove('hidden-form');
  document.getElementById('panelTitle').textContent = 'Welcome Back!';
  document.getElementById('panelSub').textContent = 'Already have an account?';
  document.getElementById('panelBtn').textContent = 'Login';
  document.getElementById('panelBtn').onclick = switchToLogin;
}

function switchToLogin() {
  if (isLogin) return;
  isLogin = true;
  document.getElementById('panel').classList.remove('right');
  document.getElementById('signupBox').classList.add('hidden-form');
  document.getElementById('loginBox').classList.remove('hidden-form');
  document.getElementById('panelTitle').textContent = 'Hello, Welcome!';
  document.getElementById('panelSub').textContent = "Don't have an account?";
  document.getElementById('panelBtn').textContent = 'Register';
  document.getElementById('panelBtn').onclick = switchToSignup;
}

const eyeOpen = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeClosed = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function toggle(id, iconId) {
  const inp = document.getElementById(id);
  const el = document.getElementById(iconId);
  if (inp.type === 'password') { inp.type = 'text'; el.innerHTML = eyeOpen; }
  else { inp.type = 'password'; el.innerHTML = eyeClosed; }
}

const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null')
  ? 'http://localhost:3000' : window.location.origin;

function forgotPassword() { window.location.href = 'forgetpassword.html'; }

async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginError');
  if (!username || !password) { err.textContent = 'Please fill all fields.'; return; }
  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok || !data.success) { err.textContent = data.message || 'Invalid credentials.'; return; }
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('userEmail', data.email || '');
    window.location.href = 'home.html';
  } catch { err.textContent = 'Unable to contact the server.'; }
}

async function signup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPass').value.trim();
  const err = document.getElementById('signupError');
  if (!username || !password || !email) { err.textContent = 'Please fill all fields.'; return; }
  try {
    const res = await fetch(`${API_BASE}/api/signup`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.message || 'Signup failed.'; return; }
    alert(data.message || 'Account created!');
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('userEmail', email);
    switchToLogin();
  } catch { err.textContent = 'Unable to contact the server.'; }
}

let SOCIAL_CONFIG = {};
async function loadOAuthConfig() {
  try {
    const res = await fetch(`${API_BASE}/api/oauth-config`);
    if (res.ok) SOCIAL_CONFIG = await res.json();
  } catch {}
}

function socialLogin(provider) {
  const err = document.getElementById('loginError');
  err.textContent = `${provider} login is not configured yet.`;
}
function socialSignup(provider) {
  const err = document.getElementById('signupError');
  err.textContent = `${provider} signup is not configured yet.`;
}

window.addEventListener('DOMContentLoaded', loadOAuthConfig);
</script>
</body>
</html>
