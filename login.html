<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ReuseMart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="transition.css">
<style>
:root {
  --green: #27ae60;
  --green-light: #2ecc71;
  --green-dark: #1a7a42;
  --green-pale: #eafaf1;
  --white: #ffffff;
  --text: #1a2e22;
  --muted: #6b8f78;
  --panel-bg: #27ae60;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

body {
  min-height: 100vh;
  background: #f0faf5;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ── Wrapper ── */
.wrapper {
  width: 100%;
  max-width: 820px;
  min-height: 500px;
  border-radius: 24px;
  box-shadow: 0 24px 60px rgba(39,174,96,0.18);
  overflow: hidden;
  position: relative;
  background: #fff;
  display: flex;
}

/* ── Sliding Green Panel ── */
.panel {
  position: absolute;
  top: 0; left: 0;
  width: 42%;
  height: 100%;
  background: linear-gradient(145deg, var(--green-light), var(--green-dark));
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 32px;
  z-index: 10;
  transition: left 0.65s cubic-bezier(0.77,0,0.18,1);
  box-shadow: 8px 0 32px rgba(39,174,96,0.18);
}

.panel.right { left: 58%; box-shadow: -8px 0 32px rgba(39,174,96,0.18); }

/* decorative blobs */
.panel::before {
  content: '';
  position: absolute;
  width: 180px; height: 180px;
  background: rgba(255,255,255,0.10);
  border-radius: 50%;
  top: -50px; right: -50px;
}
.panel::after {
  content: '';
  position: absolute;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  bottom: -30px; left: -30px;
}

.panel h2 {
  color: #fff;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}

.panel p {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  margin-bottom: 28px;
  position: relative; z-index: 1;
}

.panel-btn {
  border: 2px solid #fff;
  background: transparent;
  color: #fff;
  padding: 10px 32px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; z-index: 1;
  width: auto;
}

.panel-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-1px);
}

/* Leaf icon */
.leaf {
  margin-bottom: 16px;
  position: relative; z-index: 1;
  animation: float 3s ease-in-out infinite;
}
.leaf svg { width: 48px; height: 48px; fill: rgba(255,255,255,0.9); }
.input-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ── Form Panes ── */
.forms {
  display: flex;
  width: 100%;
}

.form-box {
  width: 58%;
  padding: 48px 44px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: opacity 0.4s, transform 0.4s;
}

.form-box.login-form  { margin-left: 42%; }
.form-box.signup-form { margin-left: 0; }

/* slide state */
.form-box.hidden-form {
  opacity: 0;
  pointer-events: none;
  position: absolute;
}

.form-box h3 {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 28px;
}

/* ── Inputs ── */
.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group input {
  width: 100%;
  padding: 13px 44px 13px 16px;
  border: 1.5px solid rgba(39,174,96,0.22);
  border-radius: 10px;
  background: #f9fefb;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
}

.input-group input::placeholder { color: var(--muted); }

.input-group input:focus {
  border-color: var(--green);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(39,174,96,0.10);
}

.input-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.input-icon:hover { color: var(--green); }

/* ── Forgot ── */
.forgot {
  font-size: 13px;
  color: var(--muted);
  text-align: right;
  margin-bottom: 20px;
  cursor: pointer;
  transition: color 0.2s;
}
.forgot:hover { color: var(--green); }

.page-exit {
  animation: pageExit 0.28s ease forwards;
}

@keyframes pageExit {
  to {
    opacity: 0;
    transform: translateX(-24px);
  }
}

/* ── Submit Button ── */
.submit-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(90deg, var(--green-light), var(--green-dark));
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(39,174,96,0.28);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(39,174,96,0.36);
}

/* ── Social Login ── */
.social-label {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin: 20px 0 14px;
  position: relative;
}
.social-label::before,.social-label::after {
  content:'';
  position: absolute;
  top:50%;
  width: 28%;
  height: 1px;
  background: rgba(39,174,96,0.2);
}
.social-label::before { left: 0; }
.social-label::after  { right: 0; }

.socials {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.social-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1.5px solid rgba(39,174,96,0.25);
  background: #f9fefb;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  padding: 0;
  position: relative;
}

.social-btn:hover {
  border-color: var(--green);
  background: #eafaf1;
  transform: translateY(-2px) scale(1.1);
  box-shadow: 0 3px 10px rgba(39,174,96,0.15);
}

.social-btn:active {
  transform: translateY(0) scale(0.98);
}

/* Provider-specific colors */
.social-btn:nth-child(1) { color: #DB4437; }
.social-btn:nth-child(2) { color: #1877F2; }
.social-btn:nth-child(3) { color: #333; }
.social-btn:nth-child(4) { color: #0A66C2; }

/* ── Error ── */
.error {
  color: #e74c3c;
  font-size: 13px;
  margin-top: 8px;
  min-height: 18px;
}

/* ── Responsive ── */
@media (max-width: 620px) {
  .wrapper { flex-direction: column; max-width: 400px; min-height: unset; }
  .panel { position: relative; width: 100%; left: 0 !important; border-radius: 20px; padding: 32px 24px; min-height: 200px; }
  .form-box { width: 100%; margin-left: 0 !important; padding: 36px 24px; }
  .form-box.hidden-form { display: none; }
}
</style>
</head>
<body>

<div class="wrapper" id="wrapper">

  <!-- Green sliding panel -->
  <div class="panel" id="panel">
    
    <h2 id="panelTitle">Hello, Welcome!</h2>
    <p id="panelSub">Don't have an account?</p>
    <button class="panel-btn" id="panelBtn" onclick="switchToSignup()">Register</button>
  </div>

  <!-- Login Form -->
  <div class="form-box login-form" id="loginBox">
    <h3>Login</h3>

    <div class="input-group">
      <input type="text" id="loginUser" placeholder="Username">
      <span class="input-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="password" id="loginPass" placeholder="Password">
      <span class="input-icon" id="loginPassIcon" onclick="toggle('loginPass','loginPassIcon')"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
    </div>

    <p class="forgot" onclick="forgotPassword()">Forgot password?</p>

    <button class="submit-btn" onclick="login()">Login</button>
    <p class="error" id="loginError"></p>

    <p class="social-label">or login with social platforms</p>
    <div class="socials">
      <button class="social-btn" onclick="socialLogin('google')" title="Login with Google">G</button>
      
    </div>
  </div>

  <!-- Signup Form -->
  <div class="form-box signup-form hidden-form" id="signupBox">
    <h3>Registration</h3>

    <div class="input-group">
      <input type="text" id="signupUser" placeholder="Username">
      <span class="input-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="email" id="signupEmail" placeholder="Email">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
    </div>

    <div class="input-group">
      <input type="password" id="signupPass" placeholder="Password">
      <span class="input-icon" id="signupPassIcon" onclick="toggle('signupPass','signupPassIcon')"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
    </div>

    <button class="submit-btn" onclick="signup()">Register</button>
    <p class="error" id="signupError"></p>

    <p class="social-label">or register with social platforms</p>
    <div class="socials">
      <button class="social-btn" onclick="socialSignup('google')" title="Register with Google">G</button>
      
    </div>
  </div>

</div>

<script>
let isLogin = true;

function switchToSignup() {
  if (!isLogin) return;
  isLogin = false;
  // slide panel right
  document.getElementById('panel').classList.add('right');
  // swap panels
  document.getElementById('loginBox').classList.add('hidden-form');
  document.getElementById('signupBox').classList.remove('hidden-form');
  // update panel text
  document.getElementById('panelTitle').textContent = 'Welcome Back!';
  document.getElementById('panelSub').textContent = 'Already have an account?';
  document.getElementById('panelBtn').textContent = 'Login';
  document.getElementById('panelBtn').onclick = switchToLogin;
}

function switchToLogin() {
  if (isLogin) return;
  isLogin = true;
  document.getElementById('panel').classList.remove('right');
  document.getElementById('signupBox').classList.add('hidden-form');
  document.getElementById('loginBox').classList.remove('hidden-form');
  document.getElementById('panelTitle').textContent = 'Hello, Welcome!';
  document.getElementById('panelSub').textContent = "Don't have an account?";
  document.getElementById('panelBtn').textContent = 'Register';
  document.getElementById('panelBtn').onclick = switchToSignup;
}

const eyeOpen = `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeClosed = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function toggle(id, iconId) {
  const inp = document.getElementById(id);
  const el = document.getElementById(iconId);
  if (inp.type === 'password') { inp.type = 'text'; el.innerHTML = eyeOpen; }
  else { inp.type = 'password'; el.innerHTML = eyeClosed; }
}

const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null')
  ? 'http://localhost:3000' : window.location.origin;

function forgotPassword() {
  const wrapper = document.getElementById('wrapper');
  wrapper.classList.add('page-exit');
  setTimeout(() => {
    navigateTo('forgetpassword.html');
  }, 250);
}

async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginError');
  if (!username || !password) { err.textContent = 'Please fill all fields.'; return; }
  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok || !data.success) { err.textContent = data.message || 'Invalid credentials.'; return; }
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('userEmail', data.email || '');
    navigateTo('home.html');
  } catch { err.textContent = 'Unable to contact the server.'; }
}

async function signup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPass').value.trim();
  const err = document.getElementById('signupError');
  if (!username || !password || !email) { err.textContent = 'Please fill all fields.'; return; }
  try {
    const res = await fetch(`${API_BASE}/api/signup`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.message || 'Signup failed.'; return; }
    alert(data.message || 'Account created!');
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('userEmail', email);
    switchToLogin();
  } catch { err.textContent = 'Unable to contact the server.'; }
}

let SOCIAL_CONFIG = {};

async function loadOAuthConfig() {
  try {
    const res = await fetch(`${API_BASE}/api/oauth-config`);
    if (res.ok) {
      SOCIAL_CONFIG = await res.json();
    }
  } catch (err) {
    console.warn('Unable to load OAuth configuration', err);
  }
}

function getSocialConfig(provider) {
  return SOCIAL_CONFIG[provider] || null;
}

function showSocialConfigError(errElement, provider, action = 'login') {
  errElement.textContent = `${provider.charAt(0).toUpperCase() + provider.slice(1)} ${action} is not configured. Please set OAuth credentials on the server.`;
}

// Generate random state for CSRF protection
function generateState() {
  return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
}

function buildOAuthUrl(provider, action) {
  const config = getSocialConfig(provider);
  if (!config) return null;
  const state = generateState();
  const redirectUri = config.redirectUri;

  const params = new URLSearchParams();
  params.set('client_id', config.clientId || config.appId || '');
  params.set('redirect_uri', redirectUri);
  params.set('response_type', 'code');
  params.set('scope', config.scope);
  params.set('state', state);
  if (provider === 'github') {
    params.set('allow_signup', 'true');
  }

  return { url: `${config.authUrl}?${params.toString()}`, state };
}

function socialLogin(provider) {
  const err = document.getElementById('loginError');
  const config = getSocialConfig(provider);
  if (!config || !(config.clientId || config.appId)) {
    showSocialConfigError(err, provider, 'login');
    return;
  }

  const authData = buildOAuthUrl(provider, 'login');
  if (!authData) {
    showSocialConfigError(err, provider, 'login');
    return;
  }

  sessionStorage.setItem(`oauth_state_${provider}`, authData.state);
  navigateTo(authData.url);
}

function socialSignup(provider) {
  const err = document.getElementById('signupError');
  const config = getSocialConfig(provider);
  if (!config || !(config.clientId || config.appId)) {
    showSocialConfigError(err, provider, 'registration');
    return;
  }

  const authData = buildOAuthUrl(provider, 'signup');
  if (!authData) {
    showSocialConfigError(err, provider, 'registration');
    return;
  }

  sessionStorage.setItem(`oauth_state_${provider}`, authData.state);
  navigateTo(authData.url);
}

function handleSocialLoginCallback() {
  const params = new URLSearchParams(window.location.search);
  const socialLogin = params.get('socialLogin');
  const username = params.get('username');
  const email = params.get('email');
  
  if (socialLogin === 'true' && username && email) {
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('userEmail', email);
    navigateTo('home.html');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  loadOAuthConfig();
  handleSocialLoginCallback();
});
</script>

<!--
  OAuth setup instructions:
  1. Copy .env.example to .env
  2. Set:
     - GOOGLE_CLIENT_ID
     - GOOGLE_CLIENT_SECRET
  3. Restart the server after updating .env
-->
<script src="transition.js"></script>
</body>
</html>
